name: Build CrossSCP

on:
  workflow_dispatch:
    inputs:
      upload_release:
        description: '上传到 GitHub Release'
        type: boolean
        default: false

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VER=$(grep "appVersion" lib/app_info.dart | grep -oP "'.*'" | tr -d "'")
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Version: $VER"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build clang pkg-config \
            libssh2-1-dev libssl-dev \
            libgtk-3-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install Dart dependencies
        run: flutter pub get

      - name: Build Flutter Linux
        run: flutter build linux --release

      - name: Package artifact
        run: |
          cd build/linux/x64/release/bundle
          tar -czf ../../../../../CrossSCP-linux-x64.tar.gz *
          cd ../../../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CrossSCP-linux-x64
          path: CrossSCP-linux-x64.tar.gz

  windows:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4

      - name: Install vcpkg + libssh2 + openssl
        shell: pwsh
        run: |
          if (-not (Test-Path C:\vcpkg)) {
            git clone https://github.com/Microsoft/vcpkg.git C:\vcpkg
            C:\vcpkg\bootstrap-vcpkg.bat
          }
          C:\vcpkg\vcpkg.exe install libssh2:x64-windows openssl:x64-windows --recurse

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install Dart dependencies
        run: flutter pub get

      - name: Build Flutter Windows
        run: flutter build windows --release
        env:
          CMAKE_TOOLCHAIN_FILE: C:/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Package artifact
        shell: pwsh
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath CrossSCP-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CrossSCP-windows-x64
          path: CrossSCP-windows-x64.zip

  release:
    needs: [linux, windows]
    runs-on: ubuntu-24.04
    if: inputs.upload_release
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VER=$(grep "appVersion" lib/app_info.dart | grep -oP "'.*'" | tr -d "'")
          echo "version=$VER" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: CrossSCP v${{ steps.version.outputs.version }}
          files: |
            CrossSCP-linux-x64/CrossSCP-linux-x64.tar.gz
            CrossSCP-windows-x64/CrossSCP-windows-x64.zip
          draft: false
          generate_release_notes: true
